services:
  # 1. WEB SERVICE (API + Frontend)
  - type: web
    name: avtorend
    env: python
    region: frankfurt
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      mkdir -p static/uploads/cars
      mkdir -p static/uploads/temp
    startCommand: cd api && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PORT
        value: "8000"  # ← ДОБАВИТЬ!
    
    # ВАЖНО: Health check endpoint!
    healthCheckPath: /health
    healthCheckTimeout: 30
    
    # Фронтенд
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    staticPublishPath: ./
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600

  # 2. BACKGROUND WORKER (Telegram бот)
  - type: worker
    name: avtorend-bot1
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd api && python telegram_bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
