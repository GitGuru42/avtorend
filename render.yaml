# render.yaml - Production Configuration for AvtoRend
services:
  - type: web
    name: avtorend-api
    env: python
    region: frankfurt
    plan: free
    branch: main
    
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      mkdir -p static/uploads/cars
      mkdir -p static/uploads/temp

    # Для FastAPI:
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    
    # ИЛИ для Flask/Django:
    # startCommand: gunicorn main:app --workers 1 --bind 0.0.0.0:$PORT

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: "http://localhost:3000,http://localhost:5173"
      - key: PORT
        value: "10000"
      - key: WEB_CONCURRENCY
        value: "1"

    autoDeploy: true
    pullRequestPreviewsEnabled: false
